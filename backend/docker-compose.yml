services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qr_app_backend
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
