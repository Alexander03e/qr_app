services:
  db:
    image: postgres:16
    container_name: queueflow_db
    env_file:
      - backend/.env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queueflow_backend
    env_file:
      - backend/.env.docker
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_GRAFANA_DASHBOARD_URL: ${VITE_GRAFANA_DASHBOARD_URL:-}
    container_name: queueflow_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: queueflow_prometheus
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - backend
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  postgres_data:
    name: queueflow_postgres_data
  prometheus_data:
    name: queueflow_prometheus_data
